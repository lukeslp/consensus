<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Consensus</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0D1117;
      --bg-surface: #161B22;
      --bg-elevated: #1C2128;
      --border:    #30363D;
      --text-0:    #E6EDF3;
      --text-1:    #8B949E;
      --text-2:    #484F58;
      --gold:      #C9A84C;
      --gold-glow: rgba(201,168,76,0.18);
      --gold-dim:  rgba(201,168,76,0.5);
      --silver:    #8B95A2;
      --silver-glow: rgba(139,149,162,0.14);
      --bronze:    #B87333;
      --bronze-glow: rgba(184,115,51,0.14);
      --agree:     #3FB950;
      --disagree:  #F85149;
      --partial:   #E3B341;
      --font-heading: 'Cormorant Garamond', serif;
      --font-mono:    'JetBrains Mono', monospace;
    }

    html, body {
      background: var(--bg);
      color: var(--text-0);
      font-family: var(--font-mono);
      height: 100%;
      overflow: hidden;
    }

    #app {
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    /* ── Header ── */
    header {
      flex: 0 0 auto;
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 14px 24px;
      background: var(--bg-surface);
      border-bottom: 1px solid var(--border);
      z-index: 10;
    }

    .wordmark {
      font-family: var(--font-heading);
      font-size: 1.6rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      color: var(--gold);
      text-shadow: 0 0 30px var(--gold-glow);
    }

    .question-display {
      font-family: var(--font-heading);
      font-size: 1rem;
      color: var(--text-1);
      font-style: italic;
      flex: 1;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
    }

    .status-pill {
      font-family: var(--font-mono);
      font-size: 0.65rem;
      padding: 3px 10px;
      border-radius: 100px;
      border: 1px solid var(--border);
      color: var(--text-1);
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }
    .status-pill.active { border-color: var(--gold-dim); color: var(--gold); }
    .status-pill.complete { border-color: rgba(63,185,80,0.4); color: var(--agree); }

    /* ── Tree container ── */
    #tree-container {
      flex: 1 1 auto;
      overflow: hidden;
      position: relative;
    }

    svg { width: 100%; height: 100%; display: block; }

    /* ── Input bar ── */
    #input-bar {
      flex: 0 0 auto;
      display: flex;
      gap: 8px;
      padding: 10px 24px;
      background: var(--bg-surface);
      border-top: 1px solid var(--border);
      align-items: center;
    }

    #question-input {
      flex: 1;
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 8px 14px;
      font-family: var(--font-mono);
      font-size: 0.8rem;
      color: var(--text-0);
      resize: none;
      min-height: 38px;
      max-height: 80px;
    }
    #question-input::placeholder { color: var(--text-2); }
    #question-input:focus { outline: none; border-color: var(--gold-dim); box-shadow: 0 0 0 3px var(--gold-glow); }

    .btn-convene {
      background: linear-gradient(135deg, var(--gold), #A88A3A);
      color: var(--bg);
      border: none;
      border-radius: 6px;
      padding: 8px 20px;
      font-family: var(--font-heading);
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      cursor: pointer;
      white-space: nowrap;
      transition: transform 0.15s, box-shadow 0.2s;
    }
    .btn-convene:hover { transform: translateY(-1px); box-shadow: 0 4px 20px var(--gold-glow); }
    .btn-convene:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

    /* ── Provider toggles ── */
    .provider-toggles {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
    }

    .ptoggle {
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-radius: 3px;
      color: var(--text-2);
      font-family: var(--font-mono);
      font-size: 0.6rem;
      padding: 2px 7px;
      cursor: pointer;
      transition: all 0.15s;
      user-select: none;
    }
    .ptoggle.on { color: var(--text-0); }
    .ptoggle.on[data-rank="king"],
    .ptoggle.on[data-rank="queen"] { border-color: var(--gold-dim); color: var(--gold); }
    .ptoggle.on[data-rank="lord"] { border-color: var(--silver); color: var(--silver); }
    .ptoggle.on[data-rank="knight"] { border-color: var(--bronze); color: var(--bronze); }

    /* ── Tooltip ── */
    #tooltip {
      position: fixed;
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 0.75rem;
      font-family: var(--font-mono);
      color: var(--text-0);
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.15s;
      z-index: 100;
      max-width: 300px;
      line-height: 1.5;
    }
    #tooltip.visible { opacity: 1; }
    #tooltip .tip-title { font-family: var(--font-heading); font-size: 0.95rem; font-weight: 600; color: var(--gold); margin-bottom: 4px; }
    #tooltip .tip-verdict { font-size: 0.7rem; margin-top: 6px; padding-top: 6px; border-top: 1px solid var(--border); }
    #tooltip .tip-response { font-size: 0.65rem; color: var(--text-2); margin-top: 4px; max-height: 100px; overflow: hidden; }

    /* ── Consensus result overlay ── */
    #consensus-overlay {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      background: linear-gradient(transparent, var(--bg-surface) 30%);
      padding: 3rem 24px 1rem;
      display: none;
      z-index: 5;
    }
    #consensus-overlay.visible { display: block; }

    .result-row {
      display: flex;
      align-items: center;
      gap: 16px;
      max-width: 720px;
      margin: 0 auto;
    }

    .result-verdict {
      font-family: var(--font-heading);
      font-size: 1.6rem;
      font-weight: 700;
    }

    .result-confidence {
      font-size: 0.75rem;
      color: var(--text-1);
    }

    .result-bar {
      flex: 1;
      height: 6px;
      border-radius: 3px;
      background: var(--bg);
      overflow: hidden;
      display: flex;
    }
    .result-bar-seg { height: 100%; transition: width 0.6s ease; }

    .result-dismiss {
      font-size: 0.65rem;
      color: var(--text-2);
      background: none;
      border: 1px solid var(--border);
      border-radius: 3px;
      padding: 3px 8px;
      cursor: pointer;
      font-family: var(--font-mono);
    }

    /* ── CSS Animations ── */
    @keyframes haloPulse {
      0%, 100% { opacity: 0.4; transform: scale(1); }
      50% { opacity: 0.9; transform: scale(1.15); }
    }
    @keyframes dashFlow {
      from { stroke-dashoffset: 28; }
      to { stroke-dashoffset: 0; }
    }
    .halo-pulse { animation: haloPulse 1.8s ease-in-out infinite; transform-origin: 0 0; transform-box: fill-box; }
    .link-active-anim { animation: dashFlow 0.6s linear infinite; }

    .stream-box { font-family: var(--font-mono); font-size: 0.6rem; fill: var(--text-1); pointer-events: none; }

    @media (max-width: 640px) {
      .wordmark { font-size: 1.2rem; }
      .question-display { display: none; }
      #input-bar { flex-wrap: wrap; }
    }
  </style>
</head>
<body>
<div id="app">
  <header>
    <span class="wordmark">Consensus</span>
    <span class="question-display" id="question-display">Ask a question — models will argue and vote</span>
    <span class="status-pill" id="status-pill">idle</span>
  </header>

  <div id="tree-container">
    <svg id="tree-svg" role="img" aria-label="Consensus debate tree showing LLM provider hierarchy and voting"></svg>
    <div id="consensus-overlay">
      <div class="result-row">
        <div class="result-verdict" id="result-verdict"></div>
        <div class="result-confidence" id="result-confidence"></div>
        <div class="result-bar" id="result-bar"></div>
        <button class="result-dismiss" onclick="document.getElementById('consensus-overlay').classList.remove('visible')">dismiss</button>
      </div>
    </div>
  </div>

  <div id="input-bar">
    <div class="provider-toggles" id="provider-toggles"></div>
    <textarea id="question-input" rows="1" placeholder="Ask something — models will research and vote…" aria-label="Research question"></textarea>
    <button class="btn-convene" id="btn-convene" onclick="startDebate()">Convene</button>
  </div>
</div>

<div id="tooltip" role="tooltip" aria-live="polite"></div>

<script>
// ── Config ──────────────────────────────────────

const API_BASE = location.hostname === 'localhost' || location.hostname === '127.0.0.1'
  ? '' : '/consensus';

const TIER_STYLE = {
  root:   { color: '#E6EDF3', glow: 'rgba(230,237,243,0.12)', strokeW: 2.5, r: 14 },
  queen:  { color: '#C9A84C', glow: 'rgba(201,168,76,0.22)',  strokeW: 2,   r: 11 },
  king:   { color: '#C9A84C', glow: 'rgba(201,168,76,0.18)',  strokeW: 2,   r: 11 },
  lord:   { color: '#8B95A2', glow: 'rgba(139,149,162,0.18)', strokeW: 1.5, r: 9  },
  knight: { color: '#B87333', glow: 'rgba(184,115,51,0.18)',  strokeW: 1.5, r: 9  },
  model:  { color: '#484F58', glow: 'rgba(100,110,120,0.14)', strokeW: 1,   r: 7  },
};

const VOTE_COLOR = { agree: '#3FB950', disagree: '#F85149', partial: '#E3B341', error: '#6E7681', pending: '#484F58', active: '#C9A84C' };
const TIER_GLYPH = { root: '?', queen: '♛', king: '♚', lord: '♜', knight: '♞', model: '·' };
const NODE_H_GAP = 180;
const NODE_V_GAP = 52;

// ── State ───────────────────────────────────────

let providerMeta = {};      // from /api/providers
let selectedProviders = new Set();
let treeData = { id: 'root', name: 'Question', tier: 'root', status: 'idle', vote: null, confidence: null, streamText: '', children: [] };
let modelResponses = {};     // model_id → full text
let svgEl, g, gLinks, gNodes, gDefs, zoomBehavior;
let width = 0, height = 0;
let _layoutCache = null;

// ── Init ────────────────────────────────────────

async function init() {
  // Fetch provider hierarchy from backend
  const res = await fetch(`${API_BASE}/api/providers`);
  const apiTree = await res.json();

  // Build provider metadata and toggles
  const togglesEl = document.getElementById('provider-toggles');
  apiTree.children.forEach(p => {
    providerMeta[p.id] = p;
    selectedProviders.add(p.id);
    const btn = document.createElement('button');
    btn.className = 'ptoggle on';
    btn.dataset.rank = p.rank;
    btn.textContent = p.name;
    btn.onclick = () => {
      if (selectedProviders.has(p.id)) { selectedProviders.delete(p.id); btn.classList.remove('on'); }
      else { selectedProviders.add(p.id); btn.classList.add('on'); }
    };
    togglesEl.appendChild(btn);
  });

  initSvg();
  redraw();
}

// ── SVG setup ───────────────────────────────────

function initSvg() {
  const container = document.getElementById('tree-container');
  width = container.clientWidth;
  height = container.clientHeight;

  svgEl = d3.select('#tree-svg').attr('viewBox', `0 0 ${width} ${height}`);
  gDefs = svgEl.append('defs');

  // Glow filters per tier
  ['root','queen','lord','knight','model'].forEach(tier => {
    const f = gDefs.append('filter').attr('id', `glow-${tier}`).attr('x','-50%').attr('y','-50%').attr('width','200%').attr('height','200%');
    f.append('feGaussianBlur').attr('stdDeviation', tier === 'root' ? 4 : 3).attr('result','blur');
    f.append('feMerge').selectAll('feMergeNode').data(['blur','SourceGraphic']).join('feMergeNode').attr('in', d => d);
  });

  g = svgEl.append('g').attr('class', 'zoom-group');
  gLinks = g.append('g').attr('class', 'links');
  gNodes = g.append('g').attr('class', 'nodes');

  zoomBehavior = d3.zoom().scaleExtent([0.3, 3]).on('zoom', e => g.attr('transform', e.transform));
  svgEl.call(zoomBehavior);
  svgEl.call(zoomBehavior.transform, d3.zoomIdentity.translate(40, height / 2));
}

// ── Tree mutation helpers ───────────────────────

function findNode(id, node = treeData) {
  if (node.id === id) return node;
  for (const c of (node.children || [])) { const f = findNode(id, c); if (f) return f; }
  return null;
}

function ensureProvider(providerId) {
  const meta = providerMeta[providerId];
  if (!meta) return null;
  let node = findNode(providerId);
  if (!node) {
    node = { id: providerId, name: meta.name, tier: meta.rank, status: 'idle', vote: null, confidence: null, streamText: '', children: [] };
    treeData.children.push(node);
  }
  return node;
}

function ensureModel(providerId, modelId) {
  const pNode = ensureProvider(providerId);
  if (!pNode) return null;
  let node = findNode(modelId);
  if (!node) {
    const meta = providerMeta[providerId];
    const mMeta = meta?.children?.find(m => m.id === modelId);
    node = { id: modelId, name: mMeta?.name || modelId.split('/')[1] || modelId, tier: 'model', status: 'idle', vote: null, confidence: null, streamText: '', children: [] };
    pNode.children.push(node);
  }
  return node;
}

// ── D3 Rendering ────────────────────────────────

function redraw() {
  if (!svgEl) return;
  const root = d3.hierarchy(treeData, d => d.children?.length ? d.children : null);
  const layout = d3.tree().nodeSize([NODE_V_GAP, NODE_H_GAP]).separation((a, b) => a.depth === 1 && b.depth === 1 ? 1.6 : 1);
  layout(root);
  // Swap x/y for horizontal tree (root left)
  root.each(d => { const tmp = d.x; d.x = d.y; d.y = tmp; });
  _layoutCache = root;
  drawLinks(root);
  drawNodes(root);
}

function drawLinks(root) {
  const linkPath = d3.linkHorizontal().x(d => d.x).y(d => d.y);
  const links = gLinks.selectAll('g.link-group')
    .data(root.links(), d => `${d.source.data.id}->${d.target.data.id}`)
    .join(enter => {
      const lg = enter.append('g').attr('class', 'link-group');
      lg.append('path').attr('class', 'link-matte');
      lg.append('path').attr('class', 'link-fore');
      lg.append('circle').attr('class', 'link-particle').attr('r', 3);
      return lg;
    });

  links.select('.link-matte').attr('d', linkPath).attr('fill','none').attr('stroke','#1C2128').attr('stroke-width', 4);

  links.select('.link-fore')
    .attr('fill','none')
    .attr('stroke-width', d => { const t = d.target.data.tier; return t === 'root' ? 3 : (t === 'queen' || t === 'king') ? 2 : t === 'lord' ? 1.5 : 1; })
    .attr('stroke', d => linkColor(d.target.data))
    .attr('opacity', d => d.target.data.vote ? 0.9 : isActive(d.target.data) ? 0.7 : 0.35)
    .attr('stroke-dasharray', d => isActive(d.target.data) ? '4 3' : null)
    .attr('d', linkPath)
    .attr('class', d => `link-fore ${isActive(d.target.data) ? 'link-active-anim' : ''}`);

  links.select('.link-particle')
    .each(function(d) {
      const streaming = isStreaming(d.target.data);
      const sel = d3.select(this);
      sel.attr('fill', streaming ? '#C9A84C' : 'transparent')
         .attr('opacity', streaming ? 0.9 : 0);
      // Only kick off an animation if one isn't already running for this node.
      // The rAF loop self-cancels as soon as status is no longer 'streaming'.
      if (streaming && !this.__animating) {
        const pathEl = this.parentNode.querySelector('.link-fore');
        if (pathEl) {
          this.__animating = true;
          const self = this;
          animateParticle(sel, pathEl, () => isStreaming(d.target.data), () => { self.__animating = false; });
        }
      }
    });
}

function drawNodes(root) {
  const nodeGroups = gNodes.selectAll('g.node')
    .data(root.descendants(), d => d.data.id)
    .join(
      enter => {
        const ng = enter.append('g').attr('class','node')
          .attr('transform', d => `translate(${d.x},${d.y})`)
          .attr('opacity', 0)
          .attr('role','button').attr('tabindex', 0)
          .attr('aria-label', d => `${d.data.name} (${d.data.tier})`);
        ng.transition().duration(500).ease(d3.easeCubicOut).attr('opacity', 1);
        ng.append('circle').attr('class','node-halo');
        ng.append('circle').attr('class','node-ring');
        ng.append('circle').attr('class','node-fill');
        ng.append('text').attr('class','node-glyph');
        ng.append('text').attr('class','node-label');
        ng.append('circle').attr('class','node-status-dot');
        ng.append('text').attr('class','node-stream stream-box');
        ng.on('mouseenter', (e, d) => showTooltip(e, d.data)).on('mouseleave', hideTooltip);
        return ng;
      },
      update => update,
      exit => exit.transition().duration(300).attr('opacity', 0).remove()
    );

  nodeGroups.transition().duration(600).ease(d3.easeCubicInOut).attr('transform', d => `translate(${d.x},${d.y})`);

  nodeGroups.select('.node-halo').attr('r', d => nodeR(d.data) + 8).attr('fill', d => TIER_STYLE[d.data.tier]?.glow || 'transparent').attr('opacity', d => isActive(d.data) ? 1 : 0).attr('class', d => `node-halo ${isActive(d.data) ? 'halo-pulse' : ''}`);

  nodeGroups.select('.node-ring').attr('r', d => nodeR(d.data)).attr('fill','none').attr('stroke', d => nodeStroke(d.data)).attr('stroke-width', d => TIER_STYLE[d.data.tier]?.strokeW || 1.5).attr('opacity', d => isActive(d.data) ? 1 : 0.7);

  nodeGroups.select('.node-fill').attr('r', d => nodeR(d.data) - 2).attr('fill', d => nodeFill(d.data)).attr('opacity', d => d.data.status === 'idle' ? 0.3 : 0.85);

  nodeGroups.select('.node-glyph').attr('text-anchor','middle').attr('dominant-baseline','central').attr('font-size', d => d.data.tier === 'root' ? 10 : 7.5).attr('font-family','JetBrains Mono, monospace').attr('fill', d => TIER_STYLE[d.data.tier]?.color || '#fff').attr('opacity', 0.9).text(d => TIER_GLYPH[d.data.tier] || '·');

  nodeGroups.select('.node-label').attr('text-anchor', d => d.depth === 0 ? 'middle' : 'start').attr('x', d => d.depth === 0 ? 0 : nodeR(d.data) + 8).attr('y', d => d.depth === 0 ? nodeR(d.data) + 14 : 0).attr('dominant-baseline','central').attr('font-size', d => d.data.tier === 'root' ? 11 : d.data.tier === 'model' ? 9 : 10).attr('font-family', d => d.data.tier === 'root' ? 'Cormorant Garamond, serif' : 'JetBrains Mono, monospace').attr('fill', d => labelColor(d.data)).text(d => d.data.name);

  nodeGroups.select('.node-status-dot').attr('cx', d => nodeR(d.data)*0.7).attr('cy', d => -nodeR(d.data)*0.7).attr('r', 3.5).attr('fill', d => statusDotColor(d.data)).attr('opacity', d => d.data.status !== 'idle' ? 1 : 0);

  nodeGroups.select('.node-stream').attr('x', d => d.data.tier === 'model' ? nodeR(d.data) + 8 : 0).attr('y', d => d.data.tier === 'model' ? 12 : 0).attr('font-size', 7).attr('fill','#484F58').attr('opacity', d => d.data.streamText ? 1 : 0).text(d => d.data.streamText ? `"${d.data.streamText.slice(-60)}…"` : '');

  // Confidence bars under voted nodes
  nodeGroups.each(function(d) {
    const g = d3.select(this);
    if (!d.data.confidence || !d.data.vote) { g.select('.conf-bar-bg').remove(); g.select('.conf-bar-fill').remove(); return; }
    const r = nodeR(d.data), barW = r * 2.4, barH = 3, barY = r + 6;
    let bg = g.select('.conf-bar-bg');
    if (bg.empty()) bg = g.append('rect').attr('class','conf-bar-bg');
    bg.attr('x', -barW/2).attr('y', barY).attr('width', barW).attr('height', barH).attr('rx', 1.5).attr('fill','#1C2128').attr('stroke','#30363D').attr('stroke-width', 0.5);
    let fill = g.select('.conf-bar-fill');
    if (fill.empty()) fill = g.append('rect').attr('class','conf-bar-fill').attr('width', 0);
    fill.attr('x', -barW/2).attr('y', barY).attr('height', barH).attr('rx', 1.5).attr('fill', VOTE_COLOR[d.data.vote]).transition().duration(400).attr('width', barW * d.data.confidence);
  });
}

// ── Style helpers ───────────────────────────────

function nodeR(d) { return TIER_STYLE[d.tier]?.r || 7; }
function isActive(d) { return d.status === 'active' || d.status === 'streaming'; }
function isStreaming(d) { return d.status === 'streaming'; }

function linkColor(d) {
  if (d.vote) return VOTE_COLOR[d.vote];
  if (d.status === 'streaming') return 'rgba(201,168,76,0.6)';
  if (d.status === 'active') return 'rgba(201,168,76,0.3)';
  return '#30363D';
}

function nodeStroke(d) {
  if (d.vote) return VOTE_COLOR[d.vote];
  if (isActive(d)) return TIER_STYLE[d.tier]?.color || '#fff';
  return '#30363D';
}

function nodeFill(d) {
  if (d.vote) return VOTE_COLOR[d.vote] + '55';
  if (isActive(d)) return TIER_STYLE[d.tier]?.glow || '#1C2128';
  return '#0D1117';
}

function labelColor(d) {
  if (d.vote) return VOTE_COLOR[d.vote];
  if (isActive(d)) return TIER_STYLE[d.tier]?.color || '#E6EDF3';
  return d.tier === 'model' ? '#8B949E' : '#C6CDD5';
}

function statusDotColor(d) {
  if (d.vote) return VOTE_COLOR[d.vote];
  if (d.status === 'streaming') return '#C9A84C';
  if (d.status === 'active') return '#3FB950';
  return 'transparent';
}

function animateParticle(dot, pathEl, isActive, onEnd) {
  const len = pathEl.getTotalLength();
  let t = 0;
  function step() {
    if (!isActive()) { dot.attr('opacity', 0); if (onEnd) onEnd(); return; }
    t = (t + 0.012) % 1;
    const pt = pathEl.getPointAtLength(t * len);
    dot.attr('cx', pt.x).attr('cy', pt.y);
    requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
}

// ── Tooltip ─────────────────────────────────────

const tipEl = document.getElementById('tooltip');

function showTooltip(event, d) {
  const responseText = modelResponses[d.id] || '';
  const voteHtml = d.vote ? `<div class="tip-verdict" style="color:${VOTE_COLOR[d.vote]}">${d.vote.toUpperCase()}${d.confidence ? ` · ${Math.round(d.confidence * 100)}%` : ''}</div>` : '';
  const responseHtml = responseText ? `<div class="tip-response">${responseText.slice(0, 300)}${responseText.length > 300 ? '…' : ''}</div>` : '';
  tipEl.innerHTML = `<div class="tip-title">${d.name}</div><div style="color:var(--text-1);font-size:0.68rem">${d.tier} · ${d.status}</div>${voteHtml}${responseHtml}`;
  tipEl.style.left = Math.min(event.clientX + 14, window.innerWidth - 320) + 'px';
  tipEl.style.top = Math.min(event.clientY - 10, window.innerHeight - 200) + 'px';
  tipEl.classList.add('visible');
}

function hideTooltip() { tipEl.classList.remove('visible'); }

function setPill(state) {
  const pill = document.getElementById('status-pill');
  pill.className = `status-pill ${state}`;
  pill.textContent = { idle: 'idle', active: 'researching…', complete: 'consensus reached' }[state] || state;
}

// ── Debate engine (connects to Flask SSE) ───────

async function startDebate() {
  const question = document.getElementById('question-input').value.trim();
  if (!question) return;

  const btn = document.getElementById('btn-convene');
  btn.disabled = true;
  btn.textContent = 'Debating…';

  // Reset tree
  treeData = { id: 'root', name: question.length > 60 ? question.slice(0, 57) + '…' : question, tier: 'root', status: 'active', vote: null, confidence: null, streamText: '', children: [] };
  modelResponses = {};
  document.getElementById('question-display').textContent = question;
  document.getElementById('consensus-overlay').classList.remove('visible');
  setPill('active');
  redraw();

  // Recenter
  svgEl.transition().duration(400).call(zoomBehavior.transform, d3.zoomIdentity.translate(40, height / 2));

  try {
    const res = await fetch(`${API_BASE}/api/debate`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ question, providers: [...selectedProviders] }),
    });
    const { session_id } = await res.json();

    const evtSource = new EventSource(`${API_BASE}/api/stream/${session_id}`);
    evtSource.onmessage = e => {
      const evt = JSON.parse(e.data);
      handleEvent(evt);
      if (evt.type === 'done') {
        evtSource.close();
        btn.disabled = false;
        btn.textContent = 'Convene';
      }
    };
    evtSource.onerror = () => { evtSource.close(); btn.disabled = false; btn.textContent = 'Convene'; };
  } catch (err) {
    console.error(err);
    btn.disabled = false;
    btn.textContent = 'Convene';
  }
}

// Normalize a stance string from the server to one of our vote keys.
function normalizeStance(s) {
  const v = (s || '').toString().toLowerCase();
  if (v === 'agree' || v === 'disagree' || v === 'partial') return v;
  if (v === 'error') return 'error';
  return 'partial';
}

// rAF-batched stream text update. Redraws are expensive; chunk events
// can fire many times per second across 10+ concurrent model streams, so
// coalesce them into one DOM write per frame.
let _streamUpdateQueued = false;
function queueStreamUpdate() {
  if (_streamUpdateQueued || !_layoutCache) return;
  _streamUpdateQueued = true;
  requestAnimationFrame(() => {
    _streamUpdateQueued = false;
    gNodes.selectAll('g.node').select('.node-stream')
      .text(d => d.data.streamText ? `"${d.data.streamText.slice(-60)}…"` : '')
      .attr('opacity', d => d.data.streamText ? 1 : 0);
  });
}

function handleEvent(evt) {
  switch (evt.type) {
    case 'model_start': {
      const [prov] = evt.data.model.split('/');
      const pNode = ensureProvider(prov);
      if (pNode && pNode.status === 'idle') pNode.status = 'active';
      const mNode = ensureModel(prov, evt.data.model);
      if (mNode) mNode.status = 'active';
      redraw();
      break;
    }
    case 'model_chunk': {
      const node = findNode(evt.data.model);
      if (node) {
        node.status = 'streaming';
        node.streamText = ((node.streamText || '') + evt.data.text).slice(-90);
        modelResponses[evt.data.model] = (modelResponses[evt.data.model] || '') + evt.data.text;
        queueStreamUpdate();
      }
      break;
    }
    case 'model_done': {
      const node = findNode(evt.data.model);
      if (node) {
        node.status = 'voted';
        node.vote = normalizeStance(evt.data.vote?.stance);
        // Use server-parsed confidence when available; fall back to a sane default.
        const conf = evt.data.vote?.confidence;
        node.confidence = typeof conf === 'number' ? Math.max(0, Math.min(1, conf)) : 0.7;
        node.streamText = '';
        modelResponses[evt.data.model] = evt.data.response;
        rollUpProviderVote(node);
        redraw();
      }
      break;
    }
    case 'model_error': {
      const node = findNode(evt.data.model);
      if (node) {
        node.status = 'voted';
        node.vote = 'error';
        node.confidence = 0;
        node.streamText = '';
        modelResponses[evt.data.model] = `ERROR: ${evt.data.error || 'unknown'}`;
        rollUpProviderVote(node);
        redraw();
      }
      break;
    }
    case 'provider_done': {
      const pNode = findNode(evt.data.provider);
      if (pNode) {
        pNode.status = 'voted';
        pNode.vote = normalizeStance(evt.data.stance);
        // Average sub-model confidence rather than making up random numbers.
        const subs = (pNode.children || []).filter(c => typeof c.confidence === 'number' && c.vote && c.vote !== 'error');
        pNode.confidence = subs.length
          ? subs.reduce((a, c) => a + c.confidence, 0) / subs.length
          : 0.6;
        redraw();
      }
      break;
    }
    case 'debate_end': {
      showConsensus(evt.data);
      break;
    }
  }
}

function rollUpProviderVote(modelNode) {
  for (const child of treeData.children) {
    if (!(child.children || []).find(m => m.id === modelNode.id)) continue;

    // Count only non-error sub-model votes toward the provider stance.
    const valid = child.children.filter(m => m.vote && m.vote !== 'error');
    if (!valid.length) return;

    const counts = { agree: 0, disagree: 0, partial: 0 };
    valid.forEach(m => { if (counts[m.vote] !== undefined) counts[m.vote]++; });
    child.vote = Object.entries(counts).sort((a, b) => b[1] - a[1])[0][0];

    // Average real sub-model confidences instead of fabricating numbers.
    const confs = valid.map(m => typeof m.confidence === 'number' ? m.confidence : 0.7);
    child.confidence = confs.reduce((a, c) => a + c, 0) / confs.length;
  }
}

function showConsensus(data) {
  // Update root. NO_QUORUM means every model errored or refused to vote.
  const raw = (data.consensus || 'PARTIAL').toLowerCase();
  if (raw === 'no_quorum') {
    treeData.vote = 'error';
  } else {
    treeData.vote = normalizeStance(raw);
  }
  treeData.confidence = (data.confidence || 0) / 100;
  treeData.status = 'voted';
  setPill('complete');
  redraw();

  // Show overlay
  const overlay = document.getElementById('consensus-overlay');
  overlay.classList.add('visible');
  const labels = {
    agree: 'Consensus: Agree',
    disagree: 'Consensus: Disagree',
    partial: 'Split Decision',
    error: 'No Quorum',
  };
  document.getElementById('result-verdict').textContent = labels[treeData.vote] || 'Result';
  document.getElementById('result-verdict').style.color = VOTE_COLOR[treeData.vote];
  document.getElementById('result-confidence').textContent =
    treeData.vote === 'error' ? 'no valid votes' : `${data.confidence}% weighted`;

  const total = (data.totals?.AGREE || 0) + (data.totals?.DISAGREE || 0) + (data.totals?.PARTIAL || 0) || 1;
  document.getElementById('result-bar').innerHTML = `
    <div class="result-bar-seg" style="width:${(data.totals?.AGREE||0)/total*100}%;background:var(--agree)"></div>
    <div class="result-bar-seg" style="width:${(data.totals?.PARTIAL||0)/total*100}%;background:var(--partial)"></div>
    <div class="result-bar-seg" style="width:${(data.totals?.DISAGREE||0)/total*100}%;background:var(--disagree)"></div>
  `;
}

// ── Keyboard ────────────────────────────────────

document.getElementById('question-input').addEventListener('keydown', e => {
  if ((e.metaKey || e.ctrlKey) && e.key === 'Enter') { e.preventDefault(); startDebate(); }
});

// ── Resize ──────────────────────────────────────

let resizeTimer;
window.addEventListener('resize', () => {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(() => {
    const c = document.getElementById('tree-container');
    width = c.clientWidth; height = c.clientHeight;
    svgEl.attr('viewBox', `0 0 ${width} ${height}`);
    redraw();
  }, 150);
});

// ── Boot ────────────────────────────────────────

init();
</script>
</body>
